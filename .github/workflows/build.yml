name: Update GitHub Profile README

on:
  schedule:
    - cron: '0 13 * * *' # Every day at ~9 AM local (EDT)
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 🔍 Fetch Latest Public Repo (by actual push time)
        id: fetch_repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching repositories..."

          REPOS=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
          "https://api.github.com/users/SkyNetCloud/repos?per_page=100")

          # Validate response
          if echo "$REPOS" | jq -e 'type != "array"' > /dev/null; then
            echo "❌ Invalid GitHub API response"
            exit 1
          fi

          # Filter repos
          FILTERED=$(echo "$REPOS" | jq '
            map(select(
              .name != "SkyNetCloud" and
              .fork == false and
              .private == false
            ))
          ')

          # Sort by pushed_at (REAL latest push)
          LATEST_REPO=$(echo "$FILTERED" | jq -r '
            sort_by(.pushed_at) | reverse | .[0].name
          ')

          if [ "$LATEST_REPO" = "null" ] || [ -z "$LATEST_REPO" ]; then
            echo "❌ No valid repository found"
            exit 1
          fi

          echo "Latest repo: $LATEST_REPO"

          echo "LATEST_REPO=$LATEST_REPO" >> $GITHUB_ENV
          echo "LATEST_REPO_URL=https://github.com/SkyNetCloud/$LATEST_REPO" >> $GITHUB_ENV

      - name: ✏️ Update README (safe marker replace)
        run: |
          echo "Updating README..."

          sed -i "/<!--START_SECTION:latest-->/, /<!--END_SECTION:latest-->/c\<!--START_SECTION:latest-->\[$LATEST_REPO]($LATEST_REPO_URL)\<!--END_SECTION:latest-->" README.md

      - name: ✅ Commit & Push (Only if changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "SkyNetCloud"
          git config --global user.email "mcboxer1201@gmail.com"

          if git diff --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi

          git add README.md
          git commit -m "🔄 Updated latest project to $LATEST_REPO"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/SkyNetCloud/SkyNetCloud.git
          git push origin main
