name: Update GitHub Profile README

on:
  schedule:
    - cron: '0 13 * * *' # Daily ~9 AM (EDT)
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 📦 Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: 🔍 Fetch ALL Public Repos (INCLUDING FORKS)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching ALL repositories..."

          ALL_REPOS="[]"
          PAGE=1

          while : ; do
            RESPONSE=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
              "https://api.github.com/users/SkyNetCloud/repos?per_page=100&page=$PAGE")

            COUNT=$(echo "$RESPONSE" | jq 'length')

            if [ "$COUNT" -eq 0 ]; then
              break
            fi

            ALL_REPOS=$(echo "$ALL_REPOS $RESPONSE" | jq -s 'add')
            PAGE=$((PAGE+1))
          done

          # Validate
          if echo "$ALL_REPOS" | jq -e 'type != "array"' > /dev/null; then
            echo "❌ Invalid GitHub API response"
            exit 1
          fi

          echo "Total repos fetched: $(echo "$ALL_REPOS" | jq length)"

          # ✅ KEEP forks now (removed .fork == false)
          FILTERED=$(echo "$ALL_REPOS" | jq '
            map(select(
              .name != "SkyNetCloud" and
              .private == false
            ))
          ')

          # Debug (optional)
          echo "$FILTERED" | jq -r '.[] | "\(.name) | fork=\(.fork) | pushed=\(.pushed_at)"' | sort -r

          # ✅ TRUE latest push across ALL repos (including forks)
          LATEST_REPO=$(echo "$FILTERED" | jq -r '
            sort_by(.pushed_at) | reverse | .[0].name
          ')

          if [ "$LATEST_REPO" = "null" ] || [ -z "$LATEST_REPO" ]; then
            echo "❌ No valid repository found"
            exit 1
          fi

          echo "✅ Latest pushed repo: $LATEST_REPO"

          echo "LATEST_REPO=$LATEST_REPO" >> $GITHUB_ENV
          echo "LATEST_REPO_URL=https://github.com/SkyNetCloud/$LATEST_REPO" >> $GITHUB_ENV

      - name: ✏️ Update README (one-line safe replace)
        run: |
          echo "Updating README..."

          sed -i "s|<!--START_SECTION:latest-->.*<!--END_SECTION:latest-->|<!--START_SECTION:latest-->[$LATEST_REPO]($LATEST_REPO_URL)<!--END_SECTION:latest-->|" README.md

      - name: ✅ Commit & Push (Only if changed)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "SkyNetCloud"
          git config --global user.email "mcboxer1201@gmail.com"

          if git diff --quiet; then
            echo "✅ No changes to commit"
            exit 0
          fi

          git add README.md
          git commit -m "🔄 Updated latest project to $LATEST_REPO"

          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/SkyNetCloud/SkyNetCloud.git
          git push origin main
